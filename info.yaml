project:
  title:   "4-bit Ripple Carry Adder"
  author:  "Efaz M. Afnan Feroz"
  discord: ""
  description: >
    A hierarchical 4-bit Ripple Carry Adder built from four
    full-adder modules. Inputs A[3:0] on ui_in[3:0] and
    B[3:0] on ui_in[7:4]. Sum output S[3:0] on uo_out[3:0],
    carry-out on uo_out[4].
  language: "Verilog"
  clock_hz: 0
  
  inputs:
    - A[0]
    - A[1]
    - A[2]
    - A[3]
    - B[0]
    - B[1]
    - B[2]
    - B[3]

  outputs:
    - S[0]
    - S[1]
    - S[2]
    - S[3]
    - Cout
    - unused
    - unused
    - unused
